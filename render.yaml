services:
  - type: web
    name: agenda-modicar
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/config
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: MODICAR_WHATSAPP
        value: "573138494513"
      - key: MODICAR_ADDRESS
        value: "Carrera 29 #33-34, Centro de Palmira, Valle del Cauca"
